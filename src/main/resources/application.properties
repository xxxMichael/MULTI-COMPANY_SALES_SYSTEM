spring.application.name=Multi-company Sales System

# Configuración de base de datos
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
# ========================
# Email (SMTP) para enviar códigos
# ========================
spring.mail.host=${SMTP_HOST:localhost}
spring.mail.port=${SMTP_PORT:1025}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=${SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SMTP_STARTTLS:false}
# (opcional) logs útiles si algo falla
# spring.mail.properties.mail.debug=true

# ========================
# Parámetros de verificación por código
# ========================
app.app-name=${APP_NAME:Multi-Company Sales System}
app.verification.code.length=${APP_VERIFICATION_CODE_LENGTH:6}
app.verification.code.ttl-minutes=${APP_VERIFICATION_CODE_TTL_MINUTES:15}
app.verification.max-attempts=${APP_VERIFICATION_MAX_ATTEMPTS:5}
