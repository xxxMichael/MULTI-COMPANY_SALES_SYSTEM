#############################################
# IMPORTAR VARIABLES DESDE .env
#############################################
spring.config.import=optional:file:.env

#############################################
# NOMBRE DE LA APLICACIÓN
#############################################
spring.application.name=${APP_NAME}

#############################################
# BASE DE DATOS POSTGRES
#############################################
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# IMPORTANTE:
# En producción se debe usar "validate" para evitar creación/alteración de tablas.
# Cambia a "update" SOLO en tu entorno local si lo necesitas.
spring.jpa.hibernate.ddl-auto=validate

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

#############################################
# SMTP / EMAIL
#############################################
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Debug opcional:
# spring.mail.properties.mail.debug=true

#############################################
# PARÁMETROS DE VERIFICACIÓN
#############################################
app.app-name=${APP_NAME}
app.verification.code.length=${APP_VERIFICATION_CODE_LENGTH}
app.verification.code.ttl-minutes=${APP_VERIFICATION_CODE_TTL_MINUTES}
app.verification.max-attempts=${APP_VERIFICATION_MAX_ATTEMPTS}

#############################################
# ADMIN KEY
#############################################
app.admin.key=${APP_ADMIN_KEY}

#############################################
# JWT CONFIG
#############################################
app.jwt.secret=${JWT_SECRET}
app.jwt.exp-minutes=${JWT_EXP_MINUTES:60}

#############################################
# SEGURIDAD Y LOGGING
#############################################
server.error.include-stacktrace=never
server.error.include-message=never
management.endpoint.env.show-values=never
management.endpoint.configprops.show-values=never

#############################################
# CONFIGURACIÓN DE ARCHIVOS
#############################################
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

#############################################
# CORRECCIÓN EXTRA
# NUNCA DEFINAS APP_NAME DOS VECES
# (ELIMINADO EL QUE TENÍAS ERRONEO AL FINAL)
#############################################
APP_NAME=multi-company-sales-system
