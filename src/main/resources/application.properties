spring.config.import=optional:file:.env

spring.application.name=${APP_NAME:Multi-Company Sales System}

# ========================
# Base de datos
# ========================
# Railway expone DATABASE_URL en formato: postgresql://user:pass@host:port/db
# Spring necesita: jdbc:postgresql://host:port/db
# Prioridad: SPRING_DATASOURCE_* > DB_* > DATABASE_URL (convertido) > localhost
spring.datasource.url=${SPRING_DATASOURCE_URL:${DB_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/Sales}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:${PGUSER:postgres}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:${PGPASSWORD:root}}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ========================
# Email (SMTP)
# ========================
spring.mail.host=${SMTP_HOST}
spring.mail.port=${SMTP_PORT}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# spring.mail.properties.mail.debug=true  # activar solo para depuración

# ========================
# Parámetros de verificación por código
# ========================
app.app-name=${APP_NAME}
app.verification.code.length=${APP_VERIFICATION_CODE_LENGTH}
app.verification.code.ttl-minutes=${APP_VERIFICATION_CODE_TTL_MINUTES}
app.verification.max-attempts=${APP_VERIFICATION_MAX_ATTEMPTS}

# ========================
# Admin Key (para crear moderadores)
# ========================
app.admin.key=${APP_ADMIN_KEY}

# ========================
# Seguridad y logging
# ========================
server.error.include-stacktrace=never
server.error.include-message=never
management.endpoint.env.show-values=never
management.endpoint.configprops.show-values=never

# ========================
# Actuator (health checks para cloud)
# ========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.health.defaults.enabled=true
#==========================
# creacion del jwt
#==========================
app.jwt.secret=${JWT_SECRET}
app.jwt.exp-minutes=${JWT_EXP_MINUTES:60}

# ========================
# Configuración de carga de archivos
# ========================
# Directorio de almacenamiento de imágenes (configurable para cloud/local)
# Local Windows: C:/productos
# Local Linux/Mac: /var/www/productos
# Cloud/Docker: /app/uploads o volumen montado
file.upload-dir=${UPLOAD_DIR:uploads}

# Tamaño máximo de archivo individual (10MB)
spring.servlet.multipart.max-file-size=10MB
# Tamaño máximo de request completo (50MB para múltiples archivos)
spring.servlet.multipart.max-request-size=50MB
# Habilitar multipart
spring.servlet.multipart.enabled=true
