# Configuración de H2 para pruebas de integración
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate - Usar dialecto correcto de H2
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Desabilitar comandos específicos de PostgreSQL
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# H2 Console (opcional, útil para debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Configuraciones de la aplicación para pruebas
app.app-name=Test App
app.verification.code.length=6
app.verification.code.ttl-minutes=15
app.verification.max-attempts=3
app.admin.key=test-admin-key

# JWT (valores de prueba)
jwt.secret=testSecretKeyForJWTTokenGenerationInTestEnvironmentOnly12345
jwt.expiration=3600000

# Email (deshabilitado para pruebas)
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=test@test.com
spring.mail.password=test

# Logging
logging.level.org.springframework.web=DEBUG
logging.level.com.multicompany.sales_system=DEBUG
